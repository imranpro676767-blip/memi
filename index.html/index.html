<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Memi Qəbələ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Məhsullarımız</h1>
    <div id="shop-products">Yüklənir...</div>

    <script>
        const supabase = supabase.createClient(
            "https://oyksujitcoofwfxberba.supabase.co", 
            "sb_publishable_6QmenthNgP3cyVAt6CbJBQ_zsca6iLw"
        );

        async function loadProducts() {
            const grid = document.getElementById('shop-products');
            const { data, error } = await supabase.from('products').select('*');
            
            if (error) { grid.innerHTML = "Xəta: " + error.message; return; }
            
            grid.innerHTML = "";
            data.forEach(p => {
                grid.innerHTML += `
                    <div style="border:1px solid #ccc; padding:10px; margin:5px;">
                        <h3>${p.title_az || 'Adsız'}</h3>
                        <p>${p.price || 0} ₼</p>
                        <button onclick="alert('Sifariş üçün bazaya qoşulun')">Sifariş Et</button>
                    </div>`;
            });
        }
        loadProducts();
    </script>
</body>
</html>
