<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memi Qəbələ - Onlayn Mağaza</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary-red: #ff0000; --dark-bg: #111111; }
        body { font-family: sans-serif; background: #f8fafc; margin: 0; padding: 20px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .product-card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        button { cursor: pointer; padding: 10px; margin: 5px; border-radius: 8px; border: none; }
        .order-btn { background: var(--primary-red); color: white; width: 100%; }
        .page { display: none; } .page.active { display: block; }
        .admin-box { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 15px; }
    </style>
</head>
<body>

    <header>
        <button onclick="showPage('shop-page')">Ana Səhifə</button>
        <button onclick="showPage('admin-login-page')">İdarəetmə</button>
    </header>

    <div id="shop-page" class="page active">
        <h1>Məhsullar</h1>
        <div class="products-grid" id="shop-products">Yüklənir...</div>
    </div>

    <div id="admin-login-page" class="page">
        <div class="admin-box">
            <h2>Admin Girişi</h2>
            <input type="password" id="admin-password" placeholder="Şifrə">
            <button onclick="checkAdminPassword()">Giriş</button>
        </div>
    </div>

    <div id="admin-dashboard-page" class="page">
        <div class="admin-box">
            <h2>Yeni Məhsul</h2>
            <input type="text" id="p-title" placeholder="Ad">
            <input type="number" id="p-price" placeholder="Qiymət">
            <button onclick="addNewProduct()">Əlavə Et</button>
            <button onclick="showPage('shop-page')">Çıxış</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://oyksujitcoofwfxberba.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_6QmenthNgP3cyVAt6CbJBQ_zsca6iLw";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadProducts() {
            const { data } = await supabase.from('products').select('*');
            const grid = document.getElementById('shop-products');
            grid.innerHTML = '';
            data?.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card">
                        <h3>${p.title_az}</h3>
                        <p>${p.price} ₼</p>
                        <button class="order-btn" onclick="orderProduct('${p.title_az}')">Sifariş Et</button>
                    </div>`;
            });
        }

        async function orderProduct(name) {
            const user = prompt("Adınız:");
            const phone = prompt("Nömrəniz:");
            if (user && phone) {
                const { error } = await supabase.from('orders').insert([{ customer_name: user, product_name: name, phone_number: phone }]);
                alert(error ? "Xəta!" : "Sifariş qəbul olundu!");
            }
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'shop-page') loadProducts();
        }

        async function addNewProduct() {
            const title = document.getElementById('p-title').value;
            const price = document.getElementById('p-price').value;
            await supabase.from('products').insert([{ title_az: title, price: price }]);
            alert("Əlavə olundu!");
            loadProducts();
        }

        function checkAdminPassword() {
            if(document.getElementById('admin-password').value === "1993") showPage('admin-dashboard-page');
            else alert("Səhv şifrə!");
        }

        loadProducts();
    </script>
</body>
</html>
