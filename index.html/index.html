<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memi Qəbələ - Onlayn Mağaza</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-red: #ff0000;    
            --logo-yellow: #ffcc00;    
            --dark-bg: #111111;       
            --light-bg: #f8fafc;      
            --card-shadow: 0 10px 25px rgba(0,0,0,0.05);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--light-bg); color: #1e293b; overflow-x: hidden; }
        
        /* Premium Header */
        header { background-color: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 4px solid var(--primary-red); box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        
        .brand-logo { display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .logo-img { width: 60px; height: 60px; object-fit: contain; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: var(--transition); }
        .brand-logo:hover .logo-img { transform: rotate(5deg) scale(1.05); }
        .logo-text { color: var(--dark-bg); font-size: 22px; font-weight: 800; letter-spacing: 0.5px; line-height: 1.1; }
        .logo-text span { color: var(--primary-red); font-size: 13px; display: block; font-weight: 600; margin-top: 3px; text-transform: uppercase; }

        .nav-buttons { display: flex; gap: 12px; align-items: center; }
        .admin-nav-btn { background: transparent; border: 2px solid #e2e8f0; color: #64748b; padding: 10px 16px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: var(--transition); font-size: 14px; }
        .admin-nav-btn:hover { border-color: var(--primary-red); color: var(--primary-red); background: #fff5f5; }
        
        .cart-btn { background: var(--logo-yellow); color: var(--dark-bg); border: 2px solid var(--dark-bg); padding: 10px 20px; border-radius: 30px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 12px rgba(255,204,0,0.25); transition: var(--transition); font-size: 14px; }
        .cart-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(255,204,0,0.4); }
        
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        
        /* Müasir Banner Dizaynı */
        .hero { background: linear-gradient(135deg, #1e1e24 0%, #0f0f12 100%); color: white; padding: 60px 40px; border-radius: 24px; text-align: left; margin-bottom: 35px; position: relative; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.15); border-right: 6px solid var(--primary-red); }
        .hero::after { content: ''; position: absolute; top: -50%; right: -20%; width: 300px; height: 300px; background: var(--primary-red); filter: blur(120px); opacity: 0.2; border-radius: 50%; }
        .hero h1 { font-size: 36px; margin-bottom: 12px; font-weight: 800; letter-spacing: -0.5px; }
        .hero p { color: #94a3b8; font-size: 16px; font-weight: 500; }

        /* Filtr Alətləri */
        .filter-bar { display: flex; gap: 15px; margin-bottom: 35px; background: white; padding: 12px; border-radius: 16px; box-shadow: var(--card-shadow); border: 1px solid #f1f5f9; }
        .search-input { flex: 1; padding: 14px 20px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 15px; outline: none; transition: var(--transition); background: #f8fafc; }
        .search-input:focus { border-color: var(--primary-red); background: white; box-shadow: 0 0 0 4px rgba(255,0,0,0.05); }
        .category-select { padding: 0 20px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 15px; background: #f8fafc; cursor: pointer; transition: var(--transition); }
        .category-select:focus { border-color: var(--primary-red); background: white; }

        .page { display: none; }
        .page.active { display: block; }
        
        /* Grid və Yeni Məhsul Kartları */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 30px; }
        .product-card { background: white; border-radius: 20px; box-shadow: var(--card-shadow); padding: 24px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid #f1f5f9; transition: var(--transition); position: relative; }
        .product-card:hover { transform: translateY(-6px); box-shadow: 0 20px 35px rgba(0,0,0,0.08); border-color: #e2e8f0; }
        
        .product-category { font-size: 11px; color: #94a3b8; margin-bottom: 10px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; background: #f1f5f9; display: inline-block; padding: 4px 10px; border-radius: 6px; }
        .product-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: #0f172a; line-height: 1.3; }
        
        .product-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #f1f5f9; padding-top: 16px; margin-top: auto; }
        .product-price { font-size: 24px; color: #0f172a; font-weight: 800; letter-spacing: -0.5px; }
        .add-to-cart { background-color: var(--dark-bg); color: white; border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: 600; transition: var(--transition); font-size: 14px; }
        .add-to-cart:hover { background-color: var(--primary-red); transform: scale(1.03); }
        
        /* Admin Giriş & Panel */
        .admin-box { max-width: 500px; margin: 40px auto; background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); border-top: 6px solid var(--primary-red); }
        .admin-box h2 { margin-bottom: 25px; text-align: center; font-weight: 800; color: #0f172a; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 14px; color: #334155; }
        .form-group input, .form-group select { width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 15px; outline: none; background: #f8fafc; }
        .form-group input:focus, .form-group select:focus { border-color: var(--primary-red); background: white; }
        
        /* Yan Səbət Modalı */
        .cart-modal { display: none; position: fixed; top: 0; right: 0; width: 420px; height: 100%; background: white; box-shadow: -15px 0 40px rgba(0,0,0,0.15); z-index: 200; padding: 35px; flex-direction: column; justify-content: space-between; border-left: 6px solid var(--primary-red); transition: var(--transition); }
        .cart-modal.active { display: flex; animation: slideIn 0.3s ease; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f1f5f9; padding-bottom: 20px; }
        .cart-header h2 { font-weight: 800; color: #0f172a; }
        .cart-items { flex: 1; overflow-y: auto; margin: 20px 0; padding-right: 5px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: #f8fafc; padding: 14px; border-radius: 14px; border: 1px solid #f1f5f9; }
        .cart-total-box { border-top: 2px solid #f1f5f9; padding-top: 20px; font-size: 22px; font-weight: 800; display: flex; justify-content: space-between; color: #0f172a; margin-bottom: 15px; }

        .delete-btn { background: #fee2e2; color: #ef4444; border: none; padding: 8px 12px; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 700; margin-top: 12px; width: 100%; text-align: center; transition: var(--transition); }
        .delete-btn:hover { background: #ef4444; color: white; }

        .loading { text-align: center; font-size: 16px; color: #64748b; padding: 50px; grid-column: 1/-1; font-weight: 500; }

        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        /* Mobil Ekranlar Üçün Optimizasiya */
        @media (max-width: 768px) {
            header { padding: 15px 20px; }
            .logo-text { font-size: 18px; }
            .hero { padding: 40px 25px; }
            .hero h1 { font-size: 28px; }
            .filter-bar { flex-direction: column; }
            .category-select { padding: 14px; }
            .cart-modal { width: 100%; }
        }
    </style>
    <style>
    .logo-img {
        width: 150px; 
        height: auto;
    }
</style>
</head>
<body>

    <header>
        <div class="brand-logo" onclick="showPage('shop-page')">
           <img src="logo.jpg" alt="Memi Qəbələ" class="logo-img">
            <div class="logo-text">MEMİ QƏBƏLƏ<span>Ultra Online Satış</span></div>
        </div>
        <div class="nav-buttons">
            <button class="admin-nav-btn" onclick="showPage('admin-login-page')">👨‍💼 İdarəetmə</button>
            <button class="cart-btn" onclick="toggleCart()">🛒 Səbət (<span id="cart-count">0</span>)</button>
        </div>
    </header>

    <div class="container">
        
        <!-- VİTRİN -->
        <div id="shop-page" class="page active">
            <div class="hero">
                <h1>Memi Qəbələ Onlayn Vitrini</h1>
                <p>Mağazamızdakı ən son məhsullar, canlı qiymətlər və dərhal onlayn səbət təcrübəsi.</p>
            </div>

            <div class="filter-bar">
                <input type="text" id="search-box" class="search-input" placeholder="Məhsul adı ilə canlı axtarış..." oninput="filterProducts()">
                <select id="category-filter" class="category-select" onchange="filterProducts()">
                    <option value="All">Bütün Kateqoriyalar</option>
                    <option value="Geyim">Geyim</option>
                    <option value="İçkilər">İçkilər</option>
                    <option value="Erzaq">Ərzaq</option>
                    <option value="Şirniyyat">Şirniyyat</option>
                </select>
            </div>
            
            <div class="products-grid" id="shop-products">
                <div class="loading">Məhsullar təhlükəsiz şəkildə yüklənir...</div>
            </div>
        </div>

        <!-- ADMİN GİRİŞ -->
        <div id="admin-login-page" class="page">
            <div class="admin-box">
                <h2>Sistem İdarəçisi Girişi</h2>
                <div class="form-group">
                    <label>Giriş Şifrəsi</label>
                    <input type="password" id="admin-password" placeholder="Şifrəni daxil edin...">
                </div>
                <button class="btn-block" style="background: var(--primary-red);" onclick="checkAdminPassword()">Giriş Et</button>
            </div>
        </div>

        <!-- MÜDİR PANELİ -->
        <div id="admin-dashboard-page" class="page">
            <div class="admin-box">
                <h2>📦 Yeni Məhsul Əlavə Et</h2>
                <div class="form-group">
                    <label>Məhsulun Adı (title_az)</label>
                    <input type="text" id="p-title" placeholder="Məsələn: Premium Saroçka">
                </div>
                <div class="form-group">
                    <label>Qiyməti (₼)</label>
                    <input type="number" id="p-price" step="0.01" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Kateqoriya</label>
                    <select id="p-category">
                        <option value="Geyim">Geyim</option>
                        <option value="İçkilər">İçkilər</option>
                        <option value="Erzaq">Ərzaq</option>
                        <option value="Şirniyyat">Şirniyyat</option>
                    </select>
                </div>
                <button class="btn-block" style="background: var(--dark-bg);" onclick="addNewProduct()">Bazaya Yaz və Vitrinə At</button>
                <button class="btn-block" style="background:#64748b; margin-top:15px;" onclick="logoutAdmin()">Paneldən Çıx</button>
            </div>
        </div>

    </div>

    <!-- SƏBƏT PANELİ -->
    <button onclick="orderProduct('Dağ Balı')">Sifariş Et</button>
    <div class="cart-modal" id="cart-modal">
        <div class="cart-header">
            <h2>🛒 Səbətiniz</h2>
            <button onclick="toggleCart()" style="background:none; border:none; font-size:24px; cursor:pointer; color:#64748b;">✕</button>
        </div>
        <div class="cart-items" id="cart-items-container">
            <p style="color:#94a3b8; text-align:center; margin-top: 30px;">Səbətiniz hal-hazırda boşdur.</p>
        </div>
        <div>
            <div class="cart-total-box">
                <span>Cəmi Ödəniş:</span>
                <span id="cart-total-price">0.00 ₼</span>
            </div>
            <button class="btn-block" style="background: var(--primary-red); padding: 16px; font-size: 16px;" onclick="alert('Sifarişiniz sistemə göndərildi!')">Alışı Tamamla</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://oyksujitcoofwfxberba.supabase.co"; 
        // 🚨 BURA ÖZ GİZLİ ANON KEYİNİ YAPIŞDIR:
        const SUPABASE_KEY = "sb_publishable_6QmenthNgP3cyVAt6CbJBQ_zsca6iLw";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        // Bura diqqət et: Dünənki kodda 'supabaseClient' yazmışdın, 
// indi biz 'supabase' istifadə edəcəyik deyə bunu əlavə edirik:
const supabase = supabaseClient; 

async function orderProduct(productName) {
    const name = prompt("Adınızı daxil edin:");
    const phone = prompt("Telefon nömrənizi daxil edin:");

    if (name && phone) {
        const { data, error } = await supabase
            .from('orders')
            .insert([{ 
                customer_name: name, 
                product_name: productName, 
                phone_number: phone 
            }]);
            
        if (error) {
            alert("Xəta baş verdi: " + error.message);
        } else {
            alert("Sifarişiniz uğurla göndərildi!");
        }
    }
}
        let localProducts = []; 
        let cart = [];          
        let isAdmin = false;    

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(pageId === 'shop-page') {
                isAdmin = false;
                loadProducts();
            }
        }
        async function orderProduct(productName) {
    const name = prompt("Adınızı daxil edin:");
    const phone = prompt("Telefon nömrənizi daxil edin:");

    if (name && phone) {
        const { data, error } = await supabase
            .from('orders')
            .insert([{ 
                customer_name: name, 
                product_name: productName, 
                phone_number: phone 
            }]);
            
        if (error) {
            alert("Xəta baş verdi: " + error.message);
        } else {
            alert("Sifarişiniz qəbul olundu!");
        }
    }
}

        async function loadProducts() {
            const shopGrid = document.getElementById('shop-products');
            try {
                const { data: products, error } = await supabaseClient.from('products').select('*');
                if (error) throw error;
                
                localProducts = products || [];
                renderProducts(localProducts);
            } catch (error) {
                shopGrid.innerHTML = `<p class="loading" style="color:red;">Baza ilə əlaqə qurulmadı.</p>`;
            }
        }

        function renderProducts(productsList) {
            const shopGrid = document.getElementById('shop-products');
            shopGrid.innerHTML = '';

            if (productsList.length === 0) {
                shopGrid.innerHTML = `<p class="loading">Axtarışa uyğun məhsul tapılmadı.</p>`;
                return;
            }

            productsList.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div>
                        <span class="product-category">${product.category || 'Ümumi'}</span>
                        <div class="product-title">${product.title_az || 'Adsız Məhsul'}</div>
                    </div>
                    <div>
                        <div class="product-footer">
                            <div class="product-price">${product.price || 0} ₼</div>
                            <button class="add-to-cart" onclick="addToCart('${product.id}', '${product.title_az}', ${product.price})">Səbətə At</button>
                        </div>
                        ${isAdmin ? `<button class="delete-btn" onclick="deleteProduct('${product.id}')">🗑️ Bu Məhsulu Sil</button>` : ''}
                    </div>
                `;
                shopGrid.appendChild(card);
            });
        }

        function filterProducts() {
            const query = document.getElementById('search-box').value.toLowerCase();
            const category = document.getElementById('category-filter').value;

            const filtered = localProducts.filter(p => {
                const matchesSearch = (p.title_az || '').toLowerCase().includes(query);
                const matchesCategory = (category === 'All' || p.category === category);
                return matchesSearch && matchesCategory;
            });

            renderProducts(filtered);
        }

        function addToCart(id, title, price) {
            const existing = cart.find(item => item.id === id);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({ id, title, price, qty: 1 });
            }
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items-container');
            const countSpan = document.getElementById('cart-count');
            const totalSpan = document.getElementById('cart-total-price');
            
            let totalCount = 0;
            let totalPrice = 0;

            if (cart.length === 0) {
                container.innerHTML = '<p style="color:#94a3b8; text-align:center; margin-top: 30px;">Səbətiniz hal-hazırda boşdur.</p>';
            } else {
                container.innerHTML = '';
                cart.forEach(item => {
                    totalCount += item.qty;
                    totalPrice += item.price * item.qty;

                    const div = document.createElement('div');
                    div.className = 'cart-item';
                    div.innerHTML = `
                        <div>
                            <strong style="color:#0f172a;">${item.title}</strong><br>
                            <span style="color:#64748b; font-size:13px;">${item.price} ₼ x ${item.qty}</span>
                        </div>
                        <button onclick="removeFromCart('${item.id}')" style="background:none; border:none; color:#ef4444; font-weight:700; cursor:pointer; font-size:13px;">Sil</button>
                    `;
                    container.appendChild(div);
                });
            }

            countSpan.innerText = totalCount;
            totalSpan.innerText = totalPrice.toFixed(2) + " ₼";
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            updateCartUI();
        }

        function toggleCart() {
            document.getElementById('cart-modal').classList.toggle('active');
        }

        function checkAdminPassword() {
            const pass = document.getElementById('admin-password').value;
            if (pass === "1993") {
                isAdmin = true;
                showPage('admin-dashboard-page');
                renderProducts(localProducts); 
                document.getElementById('admin-password').value = "";
            } else {
                alert("Şifrə səhvdir!");
            }
        }

        function logoutAdmin() {
            isAdmin = false;
            showPage('shop-page');
        }

        async function addNewProduct() {
            const title = document.getElementById('p-title').value;
            const price = parseFloat(document.getElementById('p-price').value);
            const category = document.getElementById('p-category').value;

            if (!title || !price) {
                alert("Məlumatları doldurun!");
                return;
            }

            try {
                const { error } = await supabaseClient
                    .from('products')
                    .insert([{ title_az: title, price: price, category: category }]);

                if (error) throw error;

                alert("Məhsul uğurla bazaya yazıldı!");
                document.getElementById('p-title').value = "";
                document.getElementById('p-price').value = "";
                showPage('shop-page');
            } catch (error) {
                alert("Xəta: " + error.message);
            }
        }

        async function deleteProduct(productId) {
            if (!confirm("Bu məhsulu verilənlər bazasından qəti olaraq silmək istəyirsiniz?")) return;

            try {
                const { error } = await supabaseClient
                    .from('products')
                    .delete()
                    .eq('id', productId);

                if (error) throw error;

                alert("Məhsul uğurla silindi!");
                loadProducts(); 
            } catch (error) {
                alert("Silinmə zamanı xəta oldu: " + error.message);
            }
        }

        document.addEventListener('DOMContentLoaded', loadProducts);
    </script>
</body>
</html>
