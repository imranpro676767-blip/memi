<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Memi Qəbələ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="shop-products">Məhsullar yüklənir...</div>
    <script>
        const supabase = supabase.createClient(
            "https://oyksujitcoofwfxberba.supabase.co", 
            "sb_publishable_6QmenthNgP3cyVAt6CbJBQ_zsca6iLw"
        );
        async function load() {
            const grid = document.getElementById('shop-products');
            const { data, error } = await supabase.from('products').select('*');
            if (error) { grid.innerHTML = "Xəta: " + error.message; return; }
            grid.innerHTML = data.map(p => `
                <div style="border:1px solid #000; margin:10px; padding:10px;">
                    <h3>${p.title_az}</h3>
                    <p>${p.price} ₼</p>
                    <button onclick="order('${p.title_az}')">Sifariş Et</button>
                </div>`).join('');
        }
        async function order(name) {
            const n = prompt("Adınız:");
            const p = prompt("Nömrəniz:");
            if (n && p) {
                await supabase.from('orders').insert([{ customer_name: n, product_name: name, phone_number: p, status: 'yeni' }]);
                alert("Sifariş göndərildi!");
            }
        }
        load();
    </script>
</body>
</html>
