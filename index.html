<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Memi Qəbələ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 20px; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; }
        .card { background: white; padding: 20px; margin: 15px; border-radius: 15px; width: 220px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Memi Qəbələ</h1>
    <div id="app" class="grid">Yüklənir...</div>

    <script>
        const sb = supabase.createClient("https://oyksujitcoofwfxberba.supabase.co", "sb_publishable_6QmenthNgP3cyVAt6CbJBQ_zsca6iLw");

        async function init() {
            const app = document.getElementById('app');
            const { data, error } = await sb.from('products').select('*');
            if (error) { app.innerHTML = "Xəta oldu, bazanı yoxla!"; console.log(error); return; }
            
            app.innerHTML = data.map(p => `
                <div class="card">
                    <h3>${p.title_az}</h3>
                    <p>Qiymət: ${p.price} ₼</p>
                    <button onclick="order('${p.title_az}')">Sifariş Et</button>
                </div>
            `).join('');
        }

        async function order(name) {
            const user = prompt("Adınız:");
            const phone = prompt("Nömrəniz:");
            if (user && phone) {
                await sb.from('orders').insert([{ customer_name: user, product_name: name, phone_number: phone, status: 'yeni' }]);
                alert("Sifarişiniz qəbul olundu!");
            }
        }
        init();
    </script>
</body>
</html>
