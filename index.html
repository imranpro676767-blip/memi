<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Memi Qəbələ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Sadə dizayn */
        .container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .product-card { border: 1px solid #ddd; padding: 15px; margin: 10px; border-radius: 10px; width: 200px; text-align: center; }
        .order-btn { background: #000; color: #fff; border: none; padding: 10px; cursor: pointer; width: 100%; border-radius: 5px; }
    </style>
</head>
<body>

    <h1 style="text-align:center;">Memi Qəbələ Məhsulları</h1>
    <div id="shop-products" class="container">Yüklənir...</div>

    <script>
        const supabase = supabase.createClient(
            "https://oyksujitcoofwfxberba.supabase.co", 
            "sb_publishable_6QmenthNgP3cyVAt6CbJBQ_zsca6iLw"
        );

        async function loadProducts() {
            const grid = document.getElementById('shop-products');
            const { data, error } = await supabase.from('products').select('*');
            
            if (error) { grid.innerHTML = "Xəta: " + error.message; return; }
            
            grid.innerHTML = data.map(p => `
                <div class="product-card">
                    <h3>${p.title_az || 'Adsız'}</h3>
                    <p>${p.price || 0} ₼</p>
                    <button class="order-btn" onclick="orderProduct('${p.title_az}')">Sifariş Et</button>
                </div>
            `).join('');
        }

        async function orderProduct(name) {
            const n = prompt("Adınız:");
            const p = prompt("Nömrəniz:");
            if (n && p) {
                await supabase.from('orders').insert([{ customer_name: n, product_name: name, phone_number: p, status: 'yeni' }]);
                alert("Sifarişiniz qəbul olundu!");
            }
        }

        loadProducts();
    </script>
</body>
</html>
